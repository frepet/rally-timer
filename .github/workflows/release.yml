name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./rally-timer-app
          push: true
          tags: |
            ghcr.io/frepet/rally-timer:${{ github.ref_name }}
            ghcr.io/frepet/rally-timer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
