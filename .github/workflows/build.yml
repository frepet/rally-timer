name: Build and push

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rally-timer-app/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: rally-timer-app
      - run: npm run check
        working-directory: rally-timer-app
      - run: npm run lint
        working-directory: rally-timer-app
      - run: npm test
        working-directory: rally-timer-app

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest
        working-directory: uhf-gate
      - run: python -m pytest tests/ -q
        working-directory: uhf-gate

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rally
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rally-timer-app/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: rally-timer-app
      - run: npm run build
        working-directory: rally-timer-app
      - name: Start app
        working-directory: rally-timer-app
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/rally
          SKIP_AUTH: 'true'
          ORIGIN: http://localhost:3000
        run: node build/index.js &
      - name: Wait for app ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/class && echo " — ready" && break
            echo "Waiting... ($i/30)"
            sleep 1
          done
      - name: Seed database
        run: ./seed.sh http://localhost:3000
      - name: Run e2e assertions
        run: ./verify.sh http://localhost:3000
      - name: Run rallycross e2e assertions
        run: ./verify-rallycross.sh http://localhost:3000
      - name: Run training e2e assertions
        run: ./verify-training.sh http://localhost:3000

  build:
    if: github.event_name != 'pull_request'
    needs: [unit-test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tags
        id: tags
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tags=ghcr.io/frepet/rally-timer:${{ github.ref_name }},ghcr.io/frepet/rally-timer:latest" >> $GITHUB_OUTPUT
            echo "build_sha=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/frepet/rally-timer:dev,ghcr.io/frepet/rally-timer:dev-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "build_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@v6
        with:
          context: ./rally-timer-app
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PUBLIC_BUILD_SHA=${{ steps.tags.outputs.build_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
