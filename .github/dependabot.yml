version: 2
updates:
  - package-ecosystem: npm
    directory: /rally-timer-app
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']
  - package-ecosystem: pip
    directory: /uhf-gate
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
